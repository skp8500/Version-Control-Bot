kind = "web"
previewPath = "/"
title = "mygit Web"
version = "1.0.0"
id = "artifacts/mygit-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23239

[services.development]
run = "pnpm --filter @workspace/mygit-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mygit-web", "run", "build" ]
publicDir = "artifacts/mygit-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23239"
BASE_PATH = "/"
